<!DOCTYPE html><html lang="uk"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>EventM | Manager</title>    <script src="https://cdn.tailwindcss.com"></script>    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">    <script>        tailwind.config = {            darkMode: 'class',            theme: {                extend: {                    fontFamily: { sans: ['"Outfit"', 'sans-serif'] },                    animation: {                        'blob': 'blob 7s infinite',                        'fade-in': 'fadeIn 0.5s ease-out forwards',                    },                    keyframes: {                        blob: {                            '0%': { transform: 'translate(0px, 0px) scale(1)' },                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },                            '100%': { transform: 'translate(0px, 0px) scale(1)' },                        },                        fadeIn: {                            '0%': { opacity: '0', transform: 'translateY(10px)' },                            '100%': { opacity: '1', transform: 'translateY(0)' },                        }                    }                }            }        }    </script>    <style>        body { overflow-x: hidden; transition: background-color 0.5s ease, color 0.5s ease; }        ::-webkit-scrollbar { width: 6px; }        ::-webkit-scrollbar-thumb { background: rgba(150,150,150,0.3); border-radius: 10px; }        .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); }    </style></head><body class="min-h-screen relative pb-20 bg-rose-50 text-slate-800 dark:bg-[#0f172a] dark:text-white transition-colors duration-500"><div id="auth-overlay" class="fixed inset-0 z-[100] bg-rose-50 dark:bg-[#0f172a] flex items-center justify-center p-4">    <div class="bg-white dark:bg-white/5 backdrop-blur-2xl p-8 rounded-3xl border border-pink-100 dark:border-white/10 w-full max-w-md shadow-2xl animate-fade-in">        <h2 id="auth-title" class="text-3xl font-bold mb-6 text-center text-slate-800 dark:text-white">EventM | Вхід</h2>        <form id="auth-form" class="space-y-4">            <input type="text" id="auth-email" placeholder="Ваш Email" class="w-full bg-slate-100 dark:bg-black/20 border border-transparent p-4 rounded-2xl outline-none focus:border-pink-400 dark:text-white" required>            <input type="password" id="auth-password" placeholder="Пароль" class="w-full bg-slate-100 dark:bg-black/20 border border-transparent p-4 rounded-2xl outline-none focus:border-pink-400 dark:text-white" required>            <button type="submit" class="w-full bg-gradient-to-r from-pink-500 to-rose-500 py-4 rounded-2xl text-white font-bold hover:opacity-90 transition-all shadow-lg">Продовжити</button>        </form>        <div class="mt-6 flex justify-between text-sm">            <button onclick="switchAuthMode()" id="auth-switch" class="text-pink-600 dark:text-blue-400 hover:underline">Створити акаунт</button>            <button onclick="alert('Функція в розробці.')" class="text-slate-500 hover:underline">Забули пароль?</button>        </div>    </div></div><nav class="sticky top-0 z-40 bg-white/40 dark:bg-white/5 backdrop-blur-xl border-b border-pink-200/50 dark:border-white/10 transition-colors duration-500">    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">        <div class="flex items-center gap-2">            <svg class="w-8 h-8 text-pink-500 dark:text-blue-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l2.4 7.4h7.6l-6 4.6 2.3 7.4-6.3-4.8-6.3 4.8 2.3-7.4-6-4.6h7.6z"/></svg>            <h1 class="text-2xl font-bold tracking-tight">Event<span class="text-pink-500 dark:text-blue-400">M</span></h1>        </div>        <div class="flex items-center gap-4">            <button id="invite-btn" onclick="toggleModal('invites-modal')" class="hidden w-10 h-10 rounded-full flex items-center justify-center bg-white/50 dark:bg-white/10 border border-pink-200 dark:border-white/10 text-slate-600 dark:text-yellow-300 hover:text-pink-500 transition-all relative" title="Запрошення">                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>                <span id="invite-badge" class="hidden absolute top-0 right-0 w-3 h-3 bg-red-500 border-2 border-white dark:border-[#0f172a] rounded-full"></span>            </button>            <button onclick="logout()" class="w-10 h-10 rounded-full flex items-center justify-center bg-white/50 dark:bg-white/10 border border-pink-200 dark:border-white/10 text-rose-500" title="Вийти">                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>            </button>            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full flex items-center justify-center bg-white/50 dark:bg-white/10 border border-pink-200 dark:border-white/10 text-slate-600 dark:text-yellow-300">                <svg id="theme-icon-light" class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>                <svg id="theme-icon-dark" class="w-5 h-5 block dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>            </button>            <button id="add-event-btn" onclick="toggleModal('event-modal')" class="bg-slate-900 text-white dark:bg-white dark:text-slate-900 px-6 py-2.5 rounded-full font-semibold hover:-translate-y-0.5 transition-all shadow-lg">+ Нова подія</button>        </div>    </div></nav><div id="invites-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">    <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm" onclick="toggleModal('invites-modal')"></div>    <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl max-w-md w-full relative z-10 border dark:border-white/20 shadow-2xl">        <h2 class="text-2xl font-bold mb-4 text-slate-800 dark:text-white">Нові запрошення</h2>        <div id="invites-list" class="space-y-3"></div>        <button onclick="toggleModal('invites-modal')" class="mt-6 w-full py-3 bg-slate-100 dark:bg-white/10 rounded-xl font-bold text-slate-600 dark:text-white hover:bg-slate-200 transition-colors">Закрити</button>    </div></div><main class="max-w-7xl mx-auto px-6 mt-12">    <div class="flex justify-between items-end mb-8">        <div>            <h2 id="main-title" class="text-3xl font-bold mb-2 text-slate-800 dark:text-white">Ваші івенти</h2>            <p class="text-slate-500 dark:text-slate-400">Керуйте розкладом та дедлайнами в одному місці.</p>        </div>    </div>    <div id="admin-panel" class="hidden mb-8 p-7 bg-white/80 dark:bg-white/5 rounded-3xl border border-pink-100 dark:border-white/10 shadow-xl">        <h3 class="text-2xl font-bold mb-5 text-slate-800 dark:text-white">Пошук користувачів</h3>        <div class="flex gap-3">            <input type="text" id="admin-search-input" placeholder="Введіть email або логін..." class="flex-1 p-4 bg-slate-100 dark:bg-black/20 rounded-xl outline-none text-slate-800 dark:text-white border border-transparent focus:border-pink-300 transition-colors">            <button onclick="searchUsers()" class="bg-slate-900 text-white dark:bg-white dark:text-slate-900 px-8 rounded-xl font-bold hover:-translate-y-0.5 transition-all shadow-lg">Знайти</button>        </div>        <div id="admin-users-list" class="mt-5 space-y-3"></div>    </div>    <div id="events-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div></main><div id="event-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">    <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-md" onclick="toggleModal('event-modal')"></div>    <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl max-w-lg w-full relative z-10 border dark:border-white/20 shadow-2xl">        <h2 class="text-2xl font-bold mb-6 text-slate-800 dark:text-white">Створити подію</h2>        <form id="event-form" class="space-y-5">            <input type="text" id="title" placeholder="Назва" class="w-full p-3.5 bg-slate-100 dark:bg-black/20 rounded-xl outline-none dark:text-white focus:border-pink-300 border border-transparent transition-colors" required>            <div class="grid grid-cols-2 gap-4">                <input type="date" id="date" class="w-full p-3.5 bg-slate-100 dark:bg-black/20 rounded-xl outline-none dark:text-white focus:border-pink-300 border border-transparent transition-colors" required>                <input type="text" id="location" placeholder="Локація" class="w-full p-3.5 bg-slate-100 dark:bg-black/20 rounded-xl outline-none dark:text-white focus:border-pink-300 border border-transparent transition-colors" required>            </div>            <textarea id="description" placeholder="Опис" class="w-full p-3.5 bg-slate-100 dark:bg-black/20 rounded-xl outline-none h-28 resize-none dark:text-white focus:border-pink-300 border border-transparent transition-colors"></textarea>            <button type="submit" class="w-full bg-gradient-to-r from-pink-500 to-rose-500 hover:opacity-90 text-white py-3.5 rounded-xl font-bold shadow-lg transition-all">Зберегти</button>        </form>    </div></div><div id="task-drawer" class="hidden fixed inset-0 z-50 flex justify-end">    <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm" onclick="toggleModal('task-drawer')"></div>    <div class="bg-white dark:bg-slate-900 w-full max-w-md h-full relative z-10 flex flex-col shadow-2xl">        <div class="p-6 border-b border-pink-100 dark:border-white/10 flex justify-between items-center bg-white dark:bg-slate-900 z-20">            <h2 id="drawer-event-title" class="text-xl font-bold text-slate-800 dark:text-white">Деталі & План</h2>            <button onclick="toggleModal('task-drawer')" class="text-3xl text-slate-400 hover:text-pink-500 transition-colors leading-none">&times;</button>        </div>        <div class="border-b border-pink-100 dark:border-white/10 bg-pink-50/50 dark:bg-white/5">            <button onclick="toggleUsersList()" class="w-full p-4 flex justify-between items-center text-slate-800 dark:text-white font-semibold hover:bg-pink-100/50 dark:hover:bg-white/10 transition-colors">                <span class="flex items-center gap-2">                    <svg class="w-5 h-5 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>                    Учасники команди                </span>                <svg id="users-arrow" class="w-5 h-5 text-slate-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>            </button>            <div id="users-list-container" class="hidden px-4 pb-4">                <form id="coorg-form" class="flex gap-2 mb-3">                    <input type="email" id="coorg-email" placeholder="Email для запрошення..." class="flex-1 p-2.5 bg-white dark:bg-black/20 rounded-xl outline-none text-sm text-slate-800 dark:text-white border border-pink-100 dark:border-white/10 focus:border-pink-400 transition-colors" required>                    <button type="submit" class="bg-gradient-to-r from-pink-500 to-rose-500 hover:opacity-90 text-white px-4 rounded-xl text-sm font-bold shadow-md transition-all">Запросити</button>                </form>                <div id="event-users-list" class="space-y-2 max-h-32 overflow-y-auto pr-1">                    <p class="text-xs text-slate-500 text-center py-2">Запросіть учасників для спільної роботи.</p>                </div>            </div>        </div>        <div id="tasks-list" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50/50 dark:bg-transparent"></div>        <form id="task-form" class="p-6 border-t border-pink-100 dark:border-white/10 space-y-4 bg-white dark:bg-slate-900/50">            <input type="text" id="task-name" placeholder="Що зробити?" class="w-full p-3.5 bg-slate-50 dark:bg-black/20 rounded-xl outline-none text-slate-800 dark:text-white border border-transparent focus:border-pink-300 transition-colors" required>            <input type="datetime-local" id="task-deadline" class="w-full p-3 bg-slate-50 dark:bg-black/20 rounded-xl outline-none text-xs text-slate-800 dark:text-white border border-transparent focus:border-pink-300 transition-colors" required>            <button type="submit" class="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 py-3.5 rounded-xl font-bold hover:-translate-y-0.5 shadow-lg transition-all">+ Додати завдання</button>        </form>    </div></div><script>    let currentEventId = null;    let allEvents = [];    let isLoginMode = true;    function initTheme() {        if (localStorage.theme === 'dark') document.documentElement.classList.add('dark');        else document.documentElement.classList.remove('dark');    }    initTheme();    document.addEventListener('DOMContentLoaded', () => {        const authForm = document.getElementById('auth-form');        if (authForm) authForm.addEventListener('submit', handleAuth);        if (localStorage.getItem('token')) {            document.getElementById('auth-overlay').classList.add('hidden');            loadEvents();            checkInvites();        }    });    // --- ЛОГІКА ЗАПРОШЕНЬ ---    async function checkInvites() {        if (localStorage.getItem('isAdmin') === 'true') return;        const token = localStorage.getItem('token');        document.getElementById('invite-btn').classList.remove('hidden');        const res = await fetch('http://localhost:3000/api/invitations', { headers: { 'Authorization': `Bearer ${token}` }});        const invites = await res.json();        const badge = document.getElementById('invite-badge');        const list = document.getElementById('invites-list');        if (invites.length > 0) {            badge.classList.remove('hidden');            list.innerHTML = invites.map(inv => `            <div class="p-4 bg-slate-50 dark:bg-white/5 rounded-2xl border border-pink-100 dark:border-white/10 shadow-sm">                <p class="text-sm text-slate-700 dark:text-slate-300 mb-3"><span class="font-bold text-pink-500">${inv.inviter_email}</span> запрошує вас до івенту <span class="font-bold">"${inv.title}"</span>.</p>                <div class="flex gap-2">                    <button onclick="respondInvite(${inv.id}, 'accepted')" class="flex-1 bg-pink-500 hover:bg-pink-600 text-white py-2 rounded-xl text-sm font-bold">Прийняти</button>                    <button onclick="respondInvite(${inv.id}, 'rejected')" class="flex-1 bg-slate-200 hover:bg-slate-300 dark:bg-white/10 dark:hover:bg-white/20 text-slate-700 dark:text-white py-2 rounded-xl text-sm font-bold">Відхилити</button>                </div>            </div>            `).join('');        } else {            badge.classList.add('hidden');            list.innerHTML = '<p class="text-center opacity-50">Нових запрошень немає.</p>';        }    }    async function respondInvite(inviteId, status) {        const token = localStorage.getItem('token');        await fetch(`http://localhost:3000/api/invitations/${inviteId}/respond`, {            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },            body: JSON.stringify({ status })        });        checkInvites();        loadEvents();    }    document.getElementById('coorg-form').onsubmit = async (e) => {        e.preventDefault();        const email = document.getElementById('coorg-email').value;        const token = localStorage.getItem('token');        const res = await fetch(`http://localhost:3000/api/events/${currentEventId}/invite`, {            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },            body: JSON.stringify({ email })        });        const data = await res.json();        if (res.ok) { alert("Запрошення відправлено!"); e.target.reset(); }        else { alert(data.error || "Помилка"); }    };    // --- ОСНОВНИЙ КОД АВТОРИЗАЦІЇ ---    async function handleAuth(e) {        e.preventDefault();        const email = document.getElementById('auth-email').value;        const password = document.getElementById('auth-password').value;        const endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';        try {            const res = await fetch(`http://localhost:3000${endpoint}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });            const data = await res.json();            if (res.ok) {                if (data.token) {                    localStorage.setItem('token', data.token);                    localStorage.setItem('isAdmin', data.is_admin);                    document.getElementById('auth-overlay').classList.add('hidden');                    loadEvents();                    checkInvites();                } else if (!isLoginMode && data.success) {                    alert("Успішно! Тепер увійдіть.");                    isLoginMode = true;                    switchAuthMode();                }            } else { alert(data.error || "Помилка сервера. Можливо, такий користувач вже є."); }        } catch (err) { alert("Сервер не відповідає"); }    }    function switchAuthMode() {        isLoginMode = !isLoginMode;        document.getElementById('auth-title').innerText = isLoginMode ? 'EventM | Вхід' : 'Реєстрація';        document.getElementById('auth-switch').innerText = isLoginMode ? 'Створити акаунт' : 'Вже є акаунт? Увійти';    }    function logout() {        if (confirm('Вийти?')) {            localStorage.clear();            document.getElementById('auth-overlay').classList.remove('hidden');            document.getElementById('invite-btn').classList.add('hidden');            allEvents = [];            renderEvents();        }    }    // --- ЛОГІКА АДМІНІСТРАТОРА ---    async function searchUsers() {        const query = document.getElementById('admin-search-input').value;        const res = await fetch(`http://localhost:3000/api/admin/users?search=${query}`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });        const users = await res.json();        const list = document.getElementById('admin-users-list');        if (users.length === 0) return list.innerHTML = '<p class="text-sm text-slate-500 font-medium">Нікого не знайдено.</p>';        list.innerHTML = users.map(u => `        <div class="flex justify-between items-center p-4 bg-slate-50 dark:bg-white/5 rounded-2xl border border-slate-100 dark:border-white/10 transition-all hover:shadow-md">            <span class="font-bold text-slate-700 dark:text-white">${u.email}</span>            <button onclick="loadUserEvents(${u.id}, '${u.email}')" class="text-sm bg-pink-50 dark:bg-white/10 text-pink-600 dark:text-white px-5 py-2.5 rounded-xl font-bold hover:bg-pink-100 transition-all">Показати івенти</button>        </div>        `).join('');    }    async function loadUserEvents(userId, email) {        document.getElementById('main-title').innerText = `Івенти користувача: ${email}`;        const res = await fetch(`http://localhost:3000/api/admin/users/${userId}/events`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });        allEvents = await res.json();        renderEvents();    }    // --- ВІДОБРАЖЕННЯ ІВЕНТІВ ---    async function loadEvents() {        const isAdmin = localStorage.getItem('isAdmin') === 'true';        if (isAdmin) {            document.getElementById('admin-panel').classList.remove('hidden');            document.getElementById('add-event-btn').classList.add('hidden');            document.getElementById('main-title').innerText = "Панель адміністратора";            document.getElementById('events-grid').innerHTML = '<p class="opacity-50 col-span-full text-center mt-8">Скористайтеся пошуком вище, щоб знайти івенти користувачів.</p>';            return;        }        document.getElementById('admin-panel').classList.add('hidden');        document.getElementById('add-event-btn').classList.remove('hidden');        document.getElementById('main-title').innerText = "Ваші івенти";        try {            const res = await fetch('http://localhost:3000/api/events', { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }});            if (!res.ok) return logout();            allEvents = await res.json();            renderEvents();        } catch (err) { console.error(err); }    }    function renderEvents() {        const grid = document.getElementById('events-grid');        const isAdmin = localStorage.getItem('isAdmin') === 'true';        if (!Array.isArray(allEvents) || allEvents.length === 0) return grid.innerHTML = '<p class="opacity-50 text-center col-span-full">Немає подій.</p>';        grid.innerHTML = allEvents.map(event => {            const totalTasks = event.tasks ? event.tasks.length : 0;            const completedTasks = event.tasks ? event.tasks.filter(t => t.is_completed).length : 0;            const progress = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);            const deleteBtnHtml = isAdmin ? '' : `<button onclick="deleteEvent(${event.id})" class="absolute top-4 right-4 text-slate-300 hover:text-red-500 transition-colors text-xl leading-none">&times;</button>`;            return `            <div class="bg-white/80 dark:bg-white/5 p-7 rounded-3xl border border-pink-100 dark:border-white/10 shadow-xl relative flex flex-col hover:-translate-y-1 transition-all">                ${deleteBtnHtml}                <span class="text-xs font-bold text-pink-500">${formatDate(event.date)}</span>                <h3 class="text-2xl font-bold my-3 text-slate-800 dark:text-white">${event.title}</h3>                <p class="text-sm text-slate-500 dark:text-slate-400 mb-6 flex-1">${event.description}</p>                <div class="mb-5 bg-white/50 dark:bg-black/20 p-4 rounded-2xl border border-pink-100 dark:border-white/5">                    <div class="flex justify-between text-xs font-medium mb-2"><span class="text-slate-500">Прогрес</span><span class="text-pink-600 font-bold">${completedTasks}/${totalTasks}</span></div>                    <div class="w-full bg-slate-200 dark:bg-slate-800 rounded-full h-2 overflow-hidden"><div class="bg-gradient-to-r from-pink-400 to-rose-400 h-full rounded-full transition-all duration-500" style="width: ${progress}%"></div></div>                </div>                <button onclick="openTasks(${event.id})" class="mt-2 w-full py-3 bg-pink-50 dark:bg-white/10 text-pink-600 dark:text-white rounded-xl font-bold hover:bg-pink-100 dark:hover:bg-white/20 transition-all">${isAdmin ? 'Переглянути план' : 'План &rarr;'}</button>            </div>            `;        }).join('');    }    async function deleteEvent(id) {        if (!confirm('Видалити подію?')) return;        await fetch(`http://localhost:3000/api/events/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });        loadEvents();    }    function openTasks(eventId) {        currentEventId = eventId;        const ev = allEvents.find(e => Number(e.id) === Number(eventId));        if (ev) {            document.getElementById('drawer-event-title').innerText = ev.title;            renderTasks();            renderCoorganizers(ev); // <-- Додали малювання списку учасників            document.getElementById('task-drawer').classList.remove('hidden');        }    }    // НОВА ФУНКЦІЯ: Відображення списку учасників    function renderCoorganizers(event) {        const listContainer = document.getElementById('event-users-list');        let html = '';        // 1. Спочатку малюємо Автора івенту        html += `            <div class="flex items-center justify-between p-3 bg-pink-50 dark:bg-black/20 rounded-xl border border-pink-100 dark:border-white/5 mb-2">                <span class="text-sm font-bold text-slate-800 dark:text-white truncate">${event.owner_email}</span>                <span class="text-[10px] font-bold uppercase tracking-wider text-pink-600 dark:text-pink-400 bg-pink-100 dark:bg-pink-500/20 px-2.5 py-1 rounded-md">Автор</span>            </div>        `;        // 2. Потім малюємо всіх, хто прийняв запрошення        if (event.coorganizers && event.coorganizers.length > 0) {            event.coorganizers.forEach(email => {                html += `                <div class="flex items-center justify-between p-3 bg-white dark:bg-black/10 rounded-xl border border-slate-100 dark:border-white/5 mb-2 shadow-sm">                    <span class="text-sm font-medium text-slate-600 dark:text-slate-300 truncate">${email}</span>                    <span class="text-[10px] font-bold uppercase tracking-wider text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-500/20 px-2.5 py-1 rounded-md">Учасник</span>                </div>                `;            });        } else {            // Якщо нікого немає, показуємо підказку            html += `<p class="text-xs text-slate-400 text-center py-2 mt-2">Запросіть учасників для спільної роботи.</p>`;        }        listContainer.innerHTML = html;    }    function renderTasks() {        const event = allEvents.find(e => Number(e.id) === Number(currentEventId));        const list = document.getElementById('tasks-list');        const isAdmin = localStorage.getItem('isAdmin') === 'true';        if (isAdmin) {            document.getElementById('task-form').classList.add('hidden');            document.getElementById('coorg-form').classList.add('hidden');        } else {            document.getElementById('task-form').classList.remove('hidden');            document.getElementById('coorg-form').classList.remove('hidden');        }        if (!event || !event.tasks || event.tasks.length === 0) return list.innerHTML = '<p class="opacity-50 text-sm text-center">План порожній</p>';        list.innerHTML = event.tasks.map(t => `        <div class="p-4 bg-white dark:bg-white/5 border border-slate-100 dark:border-white/10 rounded-xl flex items-center justify-between gap-3 shadow-sm">            <div class="flex items-center gap-3">                <input type="checkbox" ${t.is_completed ? 'checked' : ''} ${isAdmin ? 'disabled' : ''} onchange="toggleTask(${t.id}, this.checked)" class="w-5 h-5 accent-pink-500 ${isAdmin ? 'cursor-not-allowed' : 'cursor-pointer'}">                <div class="flex flex-col">                    <span class="text-slate-700 dark:text-slate-300 ${t.is_completed ? 'line-through opacity-50' : ''}">${t.task_name}</span>                    <span class="text-[10px] text-slate-400">${t.deadline ? new Date(t.deadline).toLocaleString('uk-UA') : ''}</span>                </div>            </div>        </div>        `).join('');    }    document.getElementById('event-form').onsubmit = async (e) => {        e.preventDefault();        const data = { title: document.getElementById('title').value, date: document.getElementById('date').value, location: document.getElementById('location').value, description: document.getElementById('description').value };        await fetch('http://localhost:3000/api/events', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` }, body: JSON.stringify(data) });        toggleModal('event-modal');        e.target.reset();        loadEvents();    };    document.getElementById('task-form').onsubmit = async (e) => {        e.preventDefault();        const data = { task_name: document.getElementById('task-name').value, deadline: document.getElementById('task-deadline').value, reminder: "Без нагадування" };        await fetch(`http://localhost:3000/api/events/${currentEventId}/tasks`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` }, body: JSON.stringify(data) });        e.target.reset();        if (localStorage.getItem('isAdmin') === 'true') searchUsers(); else await loadEvents();        renderTasks();    };    async function toggleTask(taskId, isChecked) {        await fetch(`http://localhost:3000/api/tasks/${taskId}/toggle`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` }, body: JSON.stringify({ is_completed: isChecked }) });        await loadEvents();        renderTasks();    }    function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }    function formatDate(dateStr) { return new Date(dateStr).toLocaleDateString('uk-UA', {day: 'numeric', month: 'long'}); }    function toggleTheme() { document.documentElement.classList.toggle('dark'); localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light'; }    // Функція для відкриття/закриття списку учасників    function toggleUsersList() {        const container = document.getElementById('users-list-container');        const arrow = document.getElementById('users-arrow');        if (container.classList.contains('hidden')) {            container.classList.remove('hidden');            arrow.style.transform = 'rotate(180deg)';        } else {            container.classList.add('hidden');            arrow.style.transform = 'rotate(0deg)';        }    }</script></body></html>
